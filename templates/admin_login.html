{% extends "base.html" %}
{% block title %}Admin — Spendly{% endblock %}
{% block content %}
<section class="auth-section">
    <div class="auth-container">
        <div class="auth-header">
            <h1 class="auth-title">Admin Access</h1>
            <p class="auth-subtitle">Enter your admin password</p>
        </div>
        <div class="auth-card">
            {% if wrong %}
            <div class="auth-error">Wrong password.</div>
            {% endif %}
            <form method="GET" action="/admin">
                <div class="form-group">
                    <label for="pw">Admin Password</label>
                    <input type="password" id="pw" name="pw" class="form-input"
                           placeholder="Enter admin password" required autofocus>
                </div>
                <button type="submit" class="btn-submit">Access Admin Panel</button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
